version: 2

before:
  hooks:
    - go mod tidy
    - pnpm install --frozen-lockfile
    - pnpm --filter @stackit/web build
    - mkdir -p apps/server/static
    - rm -rf apps/server/static/assets
    - cp -R apps/web/out/. apps/server/static/

builds:
  - id: cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./apps/cli
    binary: stackit
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
  - id: server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./apps/server
    binary: stackit-server
    ldflags:
      - -s -w

upx:
  - enabled: true
    ids: [cli]
    goos:
      - linux
      - windows
    compress: best

archives:
  - id: cli
    ids: [cli]
    formats: [tar.gz]
    name_template: >-
      stackit_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
  - id: server
    ids: [server]
    formats: [tar.gz]
    name_template: >-
      stackit-server_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
      - Merge pull request
      - Merge branch

brews:
  - name: stackit
    ids: [cli]
    repository:
      owner: getstackit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/getstackit/stackit"
    description: "Command-line tool for managing stacked changes in Git"
    license: "MIT"
    test: |
      system "#{bin}/stackit", "--version"
    install: |
      bin.install "stackit"
      bin.install_symlink "stackit" => "st"
  - name: stackit-server
    ids: [server]
    repository:
      owner: getstackit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/getstackit/stackit"
    description: "Server for stackit web UI and API"
    license: "MIT"
    test: |
      system "#{bin}/stackit-server", "--help"
    install: |
      bin.install "stackit-server"
