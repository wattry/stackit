[settings]
experimental = true

[env]
STACKIT_NO_LOGGING = "1"  # Used for tests
GOBIN = "{{ config_root }}/bin"
PROJECT_ROOT = "{{ config_root }}"
_.path = ["{{ config_root }}/bin", "{{ env.HOME }}/go/bin"]

[tools]
# Go toolchain
go = "1.26"
node = "22"
pnpm = "10"

# Test runner with prettier output
"go:gotest.tools/gotestsum" = "latest"

# Code formatting
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/DarthSim/overmind/v2" = "latest"

# Linting
golangci-lint = "latest"

# Development tools
"aqua:watchexec/watchexec" = "latest" # File watcher for dev auto-reload

# CLI utilities (recommended in AGENTS.md)
"aqua:BurntSushi/ripgrep" = "latest"  # Fast text search (rg)
"aqua:sharkdp/fd" = "latest"          # Fast file search
"aqua:ast-grep/ast-grep" = "latest"   # AST-based code search
"aqua:jqlang/jq" = "latest"           # JSON processing
"aqua:mikefarah/yq" = "latest"        # YAML processing
"cargo:tokei" = "latest"              # Code statistics

[tasks.compile]
description = "Check compilation only (~2s)"
run = "go build ./..."

[tasks.deps]
description = "Download dependencies for all modules"
run = """
  go mod download
  go mod tidy
"""

[tasks.build]
description = "Build CLI and API binaries with local version info"
run = """
  mkdir -p bin
  COMMIT=$(git rev-parse --short HEAD)
  DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
  go build -ldflags "-X main.version=dev-local -X main.commit=$COMMIT -X main.date=$DATE" -o bin/stackit ./apps/cli
  go build -o bin/stackit-api ./apps/api
  if [ -d ./apps/st-tui ]; then
    go build -o bin/st-tui ./apps/st-tui
  fi
  if [ ! -L ./bin/st ] && [ ! -f ./bin/st ]; then
    ln -s stackit ./bin/st
    echo "Created symlink: bin/st -> stackit"
  fi
"""

[tasks.fmt]
description = "Format code"
run = "goimports -w ."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run --allow-parallel-runners"

[tasks."lint:fix"]
description = "Run linter and fix issues"
run = "golangci-lint run --allow-parallel-runners --fix"

[tasks.test]
description = "Run all tests (with caching for faster repeated runs)"
run = "gotestsum --format pkgname-and-test-fails -- ./..."

[tasks."test:fresh"]
description = "Run all tests without caching"
run = "gotestsum --format pkgname-and-test-fails -- ./... -count=1"

[tasks."test:verbose"]
description = "Run tests with verbose output"
run = "gotestsum --format standard-verbose -- ./..."

[tasks."test:coverage"]
description = "Run tests with coverage"
run = """
  gotestsum --format pkgname-and-test-fails -- -coverprofile=coverage.out ./...
  go tool cover -html=coverage.out -o coverage.html
"""

[tasks."test:race"]
description = "Run tests with race detection"
run = "gotestsum --format pkgname-and-test-fails -- -race ./..."

[tasks."test:pkg"]
description = "Run tests for a specific package"
usage = '''
arg "package" help="Package to test (e.g. ./testhelpers)"
'''
run = "gotestsum --format standard-verbose -- {{arg(name='package')}}"

[tasks."test:fast"]
description = "Run fast unit tests (excludes integration tests)"
run = """
  PACKAGES=$(go list ./... | grep -v /integration)
  gotestsum --format pkgname-and-test-fails -- $PACKAGES
"""

[tasks."test:integration"]
description = "Run integration tests only"
run = "gotestsum --format pkgname-and-test-fails -- ./internal/integration/... ./internal/cli/integrations/... ./internal/actions/integrations/..."

[tasks.clean]
description = "Clean built binaries, shims, and test artifacts"
run = """
  rm -f coverage.out coverage.html
  rm -rf bin/
  rm -f ./stackit ./st
  find . -type d -name "stackit-test-*" -exec rm -rf {} + 2>/dev/null || true
  echo "Cleaned: binaries (bin/), shims (./stackit, ./st), and test artifacts"
"""

[tasks.check]
description = "Run all checks (Go format, lint, fast tests + web tests, typecheck, build)"
depends = ["fmt", "lint", "test:fast", "check:web"]

[tasks."check:go"]
description = "Run all Go checks (format, lint, fast tests)"
depends = ["fmt", "lint", "test:fast"]

[tasks."web:install"]
description = "Install frontend workspace dependencies"
run = "pnpm install"

[tasks."web:dev"]
description = "Run the web app in development mode"
run = "pnpm --filter @stackit/web dev"

[tasks."dev:api"]
description = "Run the API server in development mode (auto-reloads on file changes)"
run = "watchexec -r -e go -w apps/api -w internal -w api -- go run ./apps/api --port 8080"

[tasks.dev]
description = "Run API + web dev servers using overmind and Procfile.dev"
run = "overmind start -f Procfile.dev"

[tasks."dev:stop"]
description = "Stop the running overmind dev process group"
run = "overmind quit -s .overmind.sock"

[tasks."web:build"]
description = "Build the web app"
run = "pnpm --filter @stackit/web build"

[tasks."web:sync-static"]
description = "Copy built web assets into the API static directory"
depends = ["web:build"]
run = """
  mkdir -p apps/api/static
  rm -rf apps/api/static/assets
  cp -R apps/web/out/. apps/api/static/
"""

[tasks."web:test"]
description = "Run frontend tests"
run = "pnpm --filter @stackit/web test"

[tasks."check:web"]
description = "Run frontend tests, type checks, and build"
run = """
  pnpm --filter @stackit/web test
  pnpm --filter @stackit/web typecheck
  pnpm --filter @stackit/web build
"""

[tasks.shims]
description = "Install shims to repo root for local development"
depends = ["build"]
run = """
  cp scripts/stackit-shim.sh ./stackit
  cp scripts/st-shim.sh ./st
  chmod +x ./stackit ./st
  echo "Dev shims installed to repo root"
"""

[tasks.init]
description = "Initialize stackit in this repository"
depends = ["build"]
run = "./bin/stackit init"
