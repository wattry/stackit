[settings]
experimental = true

[env]
STACKIT_NO_LOGGING = "1"  # Used for tests
GOBIN = "{{ config_root }}/bin"
PROJECT_ROOT = "{{ config_root }}"
_.path = ["{{ config_root }}/bin", "{{ env.HOME }}/go/bin"]

[tools]
# Go toolchain
go = "1.25.5"

# Test runner with prettier output
"go:gotest.tools/gotestsum" = "latest"

# Code formatting
"go:golang.org/x/tools/cmd/goimports" = "latest"

# Linting
golangci-lint = "latest"

# CLI utilities (recommended in AGENTS.md)
"aqua:BurntSushi/ripgrep" = "latest"  # Fast text search (rg)
"aqua:sharkdp/fd" = "latest"          # Fast file search
"aqua:ast-grep/ast-grep" = "latest"   # AST-based code search
"aqua:jqlang/jq" = "latest"           # JSON processing
"aqua:mikefarah/yq" = "latest"        # YAML processing
"cargo:tokei" = "latest"              # Code statistics

[tasks.compile]
description = "Check compilation only (~2s)"
run = "go build ./..."

[tasks.lint-only]
description = "Run linter without fmt or tests (~5s)"
run = "golangci-lint run --allow-parallel-runners"

[tasks.deps]
description = "Download dependencies for all modules"
run = """
  go mod download
  go mod tidy
"""

[tasks.build]
description = "Build the stackit binary with local version info"
run = """
  mkdir -p bin
  COMMIT=$(git rev-parse --short HEAD)
  DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
  go build -ldflags "-X main.version=dev-local -X main.commit=$COMMIT -X main.date=$DATE" -o bin/stackit ./cmd/stackit
  if [ ! -L ./bin/st ] && [ ! -f ./bin/st ]; then
    ln -s stackit ./bin/st
    echo "Created symlink: bin/st -> stackit"
  fi
"""

[tasks.fmt]
description = "Format code"
run = "goimports -w ."

[tasks.lint]
description = "Run linter"
run = "golangci-lint run --allow-parallel-runners"

[tasks."lint-fix"]
description = "Run linter and fix issues"
run = "golangci-lint run --allow-parallel-runners --fix"

[tasks.test]
description = "Run all tests (with caching for faster repeated runs)"
run = "gotestsum --format pkgname-and-test-fails -- ./..."

[tasks."test-fresh"]
description = "Run all tests without caching"
run = "gotestsum --format pkgname-and-test-fails -- ./... -count=1"

[tasks."test-verbose"]
description = "Run tests with verbose output"
run = "gotestsum --format standard-verbose -- ./..."

[tasks."test-coverage"]
description = "Run tests with coverage"
run = """
  gotestsum --format pkgname-and-test-fails -- -coverprofile=coverage.out ./...
  go tool cover -html=coverage.out -o coverage.html
"""

[tasks."test-race"]
description = "Run tests with race detection"
run = "gotestsum --format pkgname-and-test-fails -- -race ./..."

[tasks."test-pkg"]
description = "Run tests for a specific package"
usage = '''
arg "package" help="Package to test (e.g. ./testhelpers)"
'''
run = "gotestsum --format standard-verbose -- {{arg(name='package')}}"

[tasks."test-fast"]
description = "Run fast unit tests (excludes integration tests)"
run = """
  PACKAGES=$(go list ./... | grep -v /integration)
  gotestsum --format pkgname-and-test-fails -- $PACKAGES
"""

[tasks."test-integration"]
description = "Run integration tests only"
run = "gotestsum --format pkgname-and-test-fails -- ./internal/integration/... ./internal/cli/integrations/... ./internal/actions/integrations/..."

[tasks.clean]
description = "Clean built binaries, shims, and test artifacts"
run = """
  rm -f coverage.out coverage.html
  rm -rf bin/
  rm -f ./stackit ./st
  find . -type d -name "stackit-test-*" -exec rm -rf {} + 2>/dev/null || true
  echo "Cleaned: binaries (bin/), shims (./stackit, ./st), and test artifacts"
"""

[tasks.check]
description = "Run all checks (format, lint, fast tests)"
depends = ["fmt", "lint", "test-fast"]

[tasks."install-shims"]
description = "Install shims to repo root for local development"
depends = ["build"]
run = """
  cp scripts/stackit-shim.sh ./stackit
  cp scripts/st-shim.sh ./st
  chmod +x ./stackit ./st
  echo "Dev shims installed to repo root"
"""

[tasks.init]
description = "Initialize stackit in this repository"
depends = ["build"]
run = "./bin/stackit init"

[tasks."test-merge"]
description = "Create a stack in jonnii/stackit-test and run merge against it"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail

# Prevent any unexpected editors or pagers
export GIT_EDITOR=true
export EDITOR=true
export GIT_PAGER=cat
export PAGER=cat

STACKIT="$PROJECT_ROOT/bin/stackit"
REPO_OWNER="jonnii"
REPO_NAME="stackit-test"
WORK_DIR="$PROJECT_ROOT/tmp/test-merge"
REPO_DIR="$WORK_DIR/repo"

# Reuse existing repo if it exists (e.g. after a cancelled merge)
if [ -d "$REPO_DIR/.git" ]; then
  cd "$REPO_DIR"
  echo "==> Reusing existing repo in $REPO_DIR"
  "$STACKIT" log --no-interactive || true
  echo "==> Running: stackit merge $@"
  exec "$STACKIT" merge "$@"
fi

echo "==> Setting up fresh stack in $WORK_DIR"

# Clean up any previous state
rm -rf "$WORK_DIR"
mkdir -p "$WORK_DIR"

# Phase 1: Clean remote state
echo "==> Cleaning remote state"
for pr in $(gh api "repos/$REPO_OWNER/$REPO_NAME/pulls" --jq '.[].number' 2>/dev/null || true); do
  gh pr close "$pr" --repo "$REPO_OWNER/$REPO_NAME" --delete-branch 2>/dev/null || true
done
for branch in $(gh api "repos/$REPO_OWNER/$REPO_NAME/git/refs/heads" --jq '.[].ref | select(. != "refs/heads/main") | ltrimstr("refs/heads/")' 2>/dev/null || true); do
  gh api --method DELETE "repos/$REPO_OWNER/$REPO_NAME/git/refs/heads/$branch" 2>/dev/null || true
done
for ref in $(gh api "repos/$REPO_OWNER/$REPO_NAME/git/refs/stackit" --jq '.[].ref | ltrimstr("refs/")' 2>/dev/null || true); do
  gh api --method DELETE "repos/$REPO_OWNER/$REPO_NAME/git/refs/$ref" 2>/dev/null || true
done

# Phase 2: Clone and init
echo "==> Cloning and initializing"
git clone "git@github.com:$REPO_OWNER/$REPO_NAME.git" "$REPO_DIR"
cd "$REPO_DIR"
"$STACKIT" init --trunk main --no-interactive

# Phase 3: Create 3-branch stack
echo "==> Creating stack"
mkdir -p src
cat > src/feature.go << 'EOF'
package src

func Feature() string {
    return "hello from feature"
}
EOF
git add -A
"$STACKIT" create -m "feat: add feature module" --no-interactive

cat > src/feature_test.go << 'EOF'
package src

import "testing"

func TestFeature(t *testing.T) {
    if got := Feature(); got != "hello from feature" {
        t.Errorf("got %q, want %q", got, "hello from feature")
    }
}
EOF
git add -A
"$STACKIT" create -m "test: add feature tests" --no-interactive

cat > README.md << 'EOF'
# stackit-test
Test repository for stackit merge testing.
EOF
git add -A
"$STACKIT" create -m "docs: add documentation" --no-interactive

"$STACKIT" log --no-interactive

# Phase 4: Submit PRs
echo "==> Submitting stack"
"$STACKIT" submit --no-edit --no-interactive
sleep 2

# Phase 5: Run merge
echo "==> Running: stackit merge $@"
"$STACKIT" merge "$@"
"""
