name: Stackit Lock Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  check-lock:
    name: Check Stackit Lock Status
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Stackit Metadata
        run: |
          # Fetch specifically the metadata ref for the PR branch
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          echo "Fetching metadata for branch: $BRANCH_NAME"
          git fetch origin "+refs/stackit/metadata/$BRANCH_NAME:refs/stackit/metadata/$BRANCH_NAME" || {
            echo "No metadata ref found on remote for $BRANCH_NAME."
          }

      - name: Verify Lock Status
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
          REF="refs/stackit/metadata/$BRANCH_NAME"
          
          if git show-ref --quiet "$REF"; then
            METADATA=$(git show "$REF")
            echo "Metadata found for $BRANCH_NAME"
            
            # Check for direct lock (.locked) or PR-level lock record (.prInfo.locked)
            # Stackit's 'st lock' sets .locked=true
            # Ancestor locks can be detected via .prInfo.locked if the PR was submitted/updated while locked
            IS_LOCKED=$(echo "$METADATA" | jq -r '.locked // false')
            IS_PR_LOCKED=$(echo "$METADATA" | jq -r '.prInfo.locked // false')
            
            if [ "$IS_LOCKED" = "true" ] || [ "$IS_PR_LOCKED" = "true" ]; then
              echo "::error::This PR is locked by Stackit. Merging is blocked until it is unlocked with 'st unlock'."
              exit 1
            fi
            echo "Branch is not locked."
          else
            echo "No Stackit metadata found for this branch. Proceeding..."
          fi
