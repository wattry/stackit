name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        go-version: ['stable']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git operations

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          check-latest: true

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        env:
          STACKIT_NO_LOGGING: "1"
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            go test -v -race -coverprofile=coverage.out ./...
          else
            go test -v -coverprofile=coverage.out ./...
          fi


  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          mkdir -p bin
          go build -v -o bin/stackit ./apps/cli
          pnpm --filter @stackit/web build
          ./scripts/sync-web-static.sh
          go build -v -o bin/stackit-server ./apps/server
          if [ -d ./apps/st-tui ]; then
            go build -v -o bin/st-tui ./apps/st-tui
          elif [ -d ./cmd/st-tui ]; then
            go build -v -o bin/st-tui ./cmd/st-tui
          else
            echo "st-tui entrypoint not found (expected apps/st-tui or cmd/st-tui); skipping optional st-tui build"
          fi

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run tests
        run: pnpm --filter @stackit/web test

      - name: Typecheck
        run: pnpm --filter @stackit/web typecheck

      - name: Build web app
        run: pnpm --filter @stackit/web build
