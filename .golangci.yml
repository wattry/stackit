version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: true

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - stackit.dev/stackit

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - goconst
    - unconvert
    - unparam
    - gosec
    - revive
    - gocritic
    - nilerr
    - bodyclose
    - prealloc
    - whitespace
    - errorlint
    - copyloopvar
    - tparallel
  settings:
    misspell:
      locale: US
    gosec:
      excludes:
        - G204
        - G304
        - G702
        - G703
        - G704
    revive:
      rules:
        - name: var-naming
          disabled: true
  exclusions:
    presets: []
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
      - path: _test\.go
        linters:
          - lll

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
